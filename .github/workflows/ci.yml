name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: gradle test (conformance gate + Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # AGP 9 rejects JDK 26; JDK 21 compiles both the JVM core and the :android module.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Ensure Android SDK components
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null
      # Runs the root JVM module's golden-fixture conformance tests (the
      # cross-platform wire-format gate) plus the :android Robolectric/Compose tests.
      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace

  fixtures-in-sync:
    name: fixtures match appfeedback-spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The conformance gate only means something if the vendored golden fixtures
      # still match the canonical ones in appfeedback-spec. Fail loudly on drift.
      - name: Diff vendored fixtures against the canonical spec
        run: |
          set -euo pipefail
          base=https://raw.githubusercontent.com/hayek/appfeedback-spec/main/fixtures
          dir=src/test/resources/conformance
          for f in format-cases.json parse-cases.json; do
            curl -fsSL "$base/$f" -o "/tmp/$f"
            if ! diff -u "/tmp/$f" "$dir/$f"; then
              echo "::error::$f drifted from appfeedback-spec — re-run the spec's sync-to-android.sh and commit."
              exit 1
            fi
          done
          echo "Vendored fixtures are in sync with appfeedback-spec."
