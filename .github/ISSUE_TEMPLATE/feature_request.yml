name: Feature request
description: Suggest an idea or improvement for the AppFeedback Android/Kotlin SDK.
labels: [feature-request]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem you're trying to
        solve before the solution — it helps us find the best fit.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do, and where does the SDK get in the way today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketches welcome.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other approaches you considered, and why they fall short.
