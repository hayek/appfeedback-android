# Enable Dokka 2.x ("V2") Gradle plugin so the `dokka { }` extension DSL and
# the dokkaGeneratePublicationHtml task are available. Required by Dokka 2.0.0.
org.jetbrains.dokka.experimental.gradle.pluginMode=V2Enabled
org.jetbrains.dokka.experimental.gradle.pluginMode.noWarn=true

# Single source of truth for the published version of BOTH modules (the root
# core and the :android compose module). Override at release with -Pversion=0.1.0.
version=0.1.0-SNAPSHOT
